apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: dropdown-yaml-generator
  title: Dropdown YAML Generator
  description: Generates a YAML file based on dropdown selection
spec:
  owner: user:guest
  type: service
  parameters:
    - title: Configuration
      required:
        - resourceType
        - name
      properties:
        name:
          title: Resource Name
          type: string
          description: Name of the resource
        resourceType:
          title: Resource Type
          type: string
          description: Select the type of resource
          enum: ["server", "database", "queue"]  # Dropdown options
          default: "server"  # Default selection
          ui:widget: select  # Ensures it renders as a dropdown
        configFile:
          title: Configuration File
          type: string
          description: Upload a configuration file (e.g., JSON, YAML, or text)
          ui:widget: file  # Renders a file upload input
          ui:options:
            accept: '.yaml,.yml'  # Restrict file types (optional)
  steps:
    - id: generate-yaml
      name: Generate YAML with Custom Action
      action: acme:example 
      input:
        name: ${{ parameters.name }}
        resourceType: ${{ parameters.resourceType }}
  output:
    links:
      - title: Generated YAML
        url: ${{ steps['publish'].output.remoteUrl || 'local-output' }}
