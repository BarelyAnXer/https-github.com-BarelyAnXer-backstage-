apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: dropdown-yaml-generator
  title: Dropdown YAML Generator
  description: Generates a YAML file based on dropdown selection
spec:
  owner: user:guest
  type: service
  parameters:
    - title: Secret Configuration
      required:
        - namespace
        - cloudsFile
      properties:
        namespace:
          title: Namespace
          type: string
          description: Kubernetes namespace for the Secret
          default: "default"
        cloudsFile:
          title: Clouds YAML File
          type: string
          description: Upload your clouds.yaml file
          ui:widget: file
          ui:options:
            accept: '.yaml,.yml' 
  steps:
    - id: generate-yaml
      name: Generate YAML with Custom Action
      action: acme:example 
      input:
        name: ${{ parameters.name }}
        resourceType: ${{ parameters.resourceType }}
  output:
    links:
      - title: Generated YAML
        url: ${{ steps['publish'].output.remoteUrl || 'local-output' }}
